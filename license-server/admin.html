<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Server Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #1a1a1a; color: #d0d0d0; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px; }
        h1 { font-size: 28px; margin-bottom: 30px; color: #fff; }
        .card { background: rgba(40, 40, 40, 0.8); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #fff; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 8px; color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 500; }
        .form-input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-size: 14px; }
        .form-input:focus { outline: none; border-color: #666; }
        .btn { padding: 12px 24px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #555, #333); color: #fff; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #d0d0d0; border: 1px solid rgba(255,255,255,0.1); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(40, 40, 40, 0.8); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 24px; text-align: center; }
        .stat-value { font-size: 36px; font-weight: 700; color: #fff; }
        .stat-label { color: rgba(255,255,255,0.5); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 16px; color: rgba(255,255,255,0.4); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        td { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-active { background: rgba(80,80,80,0.3); color: #aaa; }
        .badge-pending { background: rgba(100,100,100,0.3); color: #888; }
        .badge-inactive { background: rgba(60,60,60,0.3); color: #666; }
        .form-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .code { font-family: monospace; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; letter-spacing: 1px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>License Server Admin</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalCount">-</div>
                <div class="stat-label">Total Licenses</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeCount">-</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingCount">-</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="inactiveCount">-</div>
                <div class="stat-label">Inactive</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Generate New License</div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Product</label>
                    <select class="form-input" id="productSelect">
                        <option value="netfury">NetFury</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Tier</label>
                    <select class="form-input" id="tierSelect">
                        <option value="trial">Trial (5 devices)</option>
                        <option value="standard">Standard (50 devices)</option>
                        <option value="pro">Pro (200 devices)</option>
                        <option value="enterprise">Enterprise (unlimited)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Customer</label>
                    <input type="text" class="form-input" id="customerInput" placeholder="Customer name">
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="emailInput" placeholder="customer@example.com">
                </div>
            </div>
            <button class="btn btn-primary" onclick="generateLicense()">Generate License</button>
        </div>

        <div class="card">
            <div class="card-title">Validate License</div>
            <div style="display: flex; gap: 16px;">
                <input type="text" class="form-input" id="validateKey" placeholder="Enter license key">
                <button class="btn btn-secondary" onclick="validateLicense()">Validate</button>
            </div>
            <div id="validateResult" style="margin-top: 16px;"></div>
        </div>

        <div class="card">
            <div class="card-title">All Licenses</div>
            <table>
                <thead>
                    <tr>
                        <th>License Key</th>
                        <th>Product</th>
                        <th>Tier</th>
                        <th>Customer</th>
                        <th>Status</th>
                        <th>Expiry</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="licensesTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API = '/api/index.php';

        async function loadStats() {
            try {
                const response = await fetch(API + '/stats');
                const data = await response.json();
                document.getElementById('totalCount').textContent = data.total || 0;
                document.getElementById('activeCount').textContent = data.active || 0;
                document.getElementById('pendingCount').textContent = data.pending || 0;
                document.getElementById('inactiveCount').textContent = data.inactive || 0;
            } catch (e) {
                console.log('Stats not available');
            }
        }

        async function loadLicenses() {
            try {
                const response = await fetch(API + '/licenses?key=admin123');
                const data = await response.json();
                const tbody = document.getElementById('licensesTable');
                const licenses = data.licenses || {};

                tbody.innerHTML = Object.entries(licenses).map(([key, lic]) => `
                    <tr>
                        <td><code>${key}</code></td>
                        <td>${lic.product_id || '-'}</td>
                        <td>${(lic.tier || '').toUpperCase()}</td>
                        <td>${lic.customer || '-'}</td>
                        <td><span class="badge badge-${lic.status || 'inactive'}">${(lic.status || 'inactive').toUpperCase()}</span></td>
                        <td>${lic.expiry_date || '-'}</td>
                        <td>
                            <button class="btn btn-secondary" onclick="revokeLicense('${key}')" style="padding: 6px 12px; font-size: 12px;">Revoke</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                console.log('Licenses not available');
            }
        }

        async function generateLicense() {
            const product = document.getElementById('productSelect').value;
            const tier = document.getElementById('tierSelect').value;
            const customer = document.getElementById('customerInput').value;
            const email = document.getElementById('emailInput').value;

            const response = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    admin_key: 'admin123',
                    action: 'generate',
                    product_id: product,
                    tier: tier,
                    customer: customer,
                    email: email
                })
            });

            const data = await response.json();
            if (data.success) {
                alert('License generated: ' + data.license_key);
                loadLicenses();
                loadStats();
            } else {
                alert('Error: ' + (data.error || 'Failed'));
            }
        }

        async function validateLicense() {
            const key = document.getElementById('validateKey').value;
            const resultDiv = document.getElementById('validateResult');

            const response = await fetch(API + '/validate/' + encodeURIComponent(key));
            const data = await response.json();

            if (data.valid) {
                const lic = data.license || {};
                resultDiv.innerHTML = `<div style="padding: 16px; background: rgba(80,80,80,0.2); border-radius: 8px;">
                    <strong>VALID</strong><br>
                    Status: ${lic.status || 'pending'}<br>
                    Customer: ${lic.customer || '-'}<br>
                    Product: ${lic.product_id || '-'}<br>
                    Tier: ${(lic.tier || '').toUpperCase()}
                </div>`;
            } else {
                resultDiv.innerHTML = `<div style="padding: 16px; background: rgba(100,60,60,0.2); border-radius: 8px; color: #faa;">
                    <strong>INVALID:</strong> ${data.reason || 'Unknown'}
                </div>`;
            }
        }

        async function revokeLicense(key) {
            if (!confirm('Revoke this license?')) return;

            const response = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    admin_key: 'admin123',
                    action: 'revoke',
                    license_key: key,
                    reason: 'Admin revocation'
                })
            });

            const data = await response.json();
            if (data.success) {
                loadLicenses();
                loadStats();
            } else {
                alert('Error: ' + (data.error || 'Failed'));
            }
        }

        loadStats();
        loadLicenses();
    </script>
</body>
</html>
