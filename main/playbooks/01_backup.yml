---
# Network Configuration Backup Playbook
# Phase 2: Config Backup System
# Usage: ansible-playbook playbooks/01_backup.yml

- name: Backup Network Device Configurations
  hosts: all
  gather_facts: true
  connection: network_cli

  vars:
    backup_root: /opt/network-automation/backups
    timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
    git_repo: "{{ git_repo | default('git@github.com:your-org/network-configs.git') }}"

  tasks:
    - name: Create backup directory structure
      ansible.builtin.file:
        path: "{{ backup_root }}/{{ inventory_hostname }}"
        state: directory
        mode: '0755'
      run_once: true

    - name: Get running configuration (Cisco IOS-XR)
      cisco.ios.ios_command:
        commands: show running-config
      register: iosxr_config
      when: ansible_network_os | regex_search('iosxr')

    - name: Get running configuration (Huawei VRP)
      community.network.ce_command:
        commands: display current-configuration
      register: huawei_config
      when: ansible_network_os | regex_search('vrp|ce68')

    - name: Save configuration to backup file
      ansible.builtin.copy:
        content: |
          # ============================================
          # Device: {{ inventory_hostname }}
          # Date: {{ timestamp }}
          # Ansible Host: {{ ansible_host }}
          # Site: {{ site | default('unknown') }}
          # Role: {{ role | default('unknown') }}
          # ============================================

          {% if iosxr_config is defined and iosxr_config.stdout_lines is defined %}
          {{ iosxr_config.stdout_lines[0] | join('\n') }}
          {% elif huawei_config is defined and huawei_config.stdout_lines is defined %}
          {{ huawei_config.stdout_lines[0] | join('\n') }}
          {% endif %}
        dest: "{{ backup_root }}/{{ inventory_hostname }}/running-config_{{ timestamp }}.cfg"
        mode: '0644'
      when: >-
        (iosxr_config is defined and iosxr_config.stdout_lines is defined) or
        (huawei_config is defined and huawei_config.stdout_lines is defined)

    - name: Get interface status
      cisco.ios.ios_command:
        commands: show ip interface brief
      register: interface_status
      when: ansible_network_os | regex_search('iosxr')
      ignore_errors: true

    - name: Get BGP summary
      cisco.ios.ios_command:
        commands: show bgp summary
      register: bgp_summary
      when: ansible_network_os | regex_search('iosxr')
      ignore_errors: true

    - name: Save interface and BGP status
      ansible.builtin.copy:
        content: |
          # ============================================
          # Status Snapshot: {{ inventory_hostname }}
          # Date: {{ timestamp }}
          # ============================================

          ## Interface Status
          {% if interface_status is defined and interface_status.stdout_lines is defined %}
          {{ interface_status.stdout_lines[0] | join('\n') }}
          {% else %}
          N/A
          {% endif %}

          ## BGP Summary
          {% if bgp_summary is defined and bgp_summary.stdout_lines is defined %}
          {{ bgp_summary.stdout_lines[0] | join('\n') }}
          {% else %}
          N/A
          {% endif %}
        dest: "{{ backup_root }}/{{ inventory_hostname }}/status_{{ timestamp }}.txt"
        mode: '0644'

    - name: Calculate config checksum for change detection
      ansible.builtin.stat:
        path: "{{ backup_root }}/{{ inventory_hostname }}/running-config_{{ timestamp }}.cfg"
      register: config_file

    - name: Read previous config for diff
      ansible.builtin.slurp:
        src: "{{ backup_root }}/{{ inventory_hostname }}/running-config_latest.cfg"
      register: previous_config
      ignore_errors: true

    - name: Detect configuration changes
      ansible.builtin.set_fact:
        config_changed: true
        config_diff: "{{ config_file.stat.checksum != (previous_config.content | hash('sha1')) }}"
      when: previous_config.content is defined

    - name: Update symlink to latest config
      ansible.builtin.file:
        src: "{{ backup_root }}/{{ inventory_hostname }}/running-config_{{ timestamp }}.cfg"
        dest: "{{ backup_root }}/{{ inventory_hostname }}/running-config_latest.cfg"
        state: link
        force: yes

    - name: Alert on configuration change
      ansible.builtin.debug:
        msg: "CONFIGURATION CHANGE DETECTED on {{ inventory_hostname }}!"
      when: config_changed | default(false) | bool

    - name: Create git commit for backup
      ansible.builtin.shell: |
        cd {{ backup_root }}
        git add {{ inventory_hostname }}/
        git commit -m "Backup {{ inventory_hostname }} {{ timestamp }}"
      register: git_commit
      ignore_errors: true
      when: git_repo | regex_search('git@')

    - name: Display backup results
      ansible.builtin.debug:
        msg: "Backup completed for {{ inventory_hostname }} - File: {{ backup_root }}/{{ inventory_hostname }}/running-config_{{ timestamp }}.cfg"

# Handler for notifications
  handlers:
    - name: Send backup alert
      ansible.builtin.mail:
        host: localhost
        port: 25
        from: ansible@network-automation.local
        to: "{{ alert_email }}"
        subject: "Config Backup - {{ inventory_hostname }}"
        body: |
          Configuration backup completed for {{ inventory_hostname }}
          Time: {{ timestamp }}
          Status: {{ ansible_play_hosts_all | length }} devices backed up