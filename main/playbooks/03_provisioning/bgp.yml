---
# BGP Peer Management Playbook
# Phase 4: Config Provisioning
# Usage: ansible-playbook playbooks/03_provisioning/bgp.yml -e "bgp_as=65000 peer_ip=192.168.1.100 peer_as=65001"

- name: Manage BGP Peers
  hosts: all
  gather_facts: false
  connection: network_cli

  vars:
    bgp_as: "{{ bgp_as | default(omit) }}"
    bgp_router_id: "{{ bgp_router_id | default(omit) }}"
    peer_ip: "{{ peer_ip | default(omit) }}"
    peer_as: "{{ peer_as | default(omit) }}"
    peer_description: "{{ peer_description | default('BGP Peer') }}"
    bgp_neighbors:
      - ip: "{{ peer_ip }}"
        remote_as: "{{ peer_as }}"
        description: "{{ peer_description }}"
        weight: "{{ weight | default(100) }}"
        next_hop_self: "{{ next_hop_self | default(false) }}"
        password: "{{ password | default(omit) }}"

  tasks:
    - name: Validate BGP configuration
      ansible.builtin.fail:
        msg: "bgp_as, peer_ip, and peer_as are required"
      when: bgp_as is not defined or peer_ip is not defined or peer_as is not defined

    # === CISCO IOS-XR BGP CONFIGURATION ===
    - name: Configure BGP process on Cisco IOS-XR
      cisco.ios.ios_config:
        lines:
          - bgp {{ bgp_as }}
          - router-id {{ bgp_router_id | default(omit) }}
          - address-family ipv4 unicast
      parents: []
      when: ansible_network_os | regex_search('iosxr')

    - name: Configure BGP neighbor on Cisco IOS-XR
      cisco.ios.ios_config:
        lines:
          - remote-as {{ peer_as }}
          - description {{ peer_description }}
          - weight {{ item.weight | default(100) }}
          - address-family ipv4 unicast
      parents:
        - router bgp {{ bgp_as }}
        - neighbor {{ item.ip }}
      loop: "{{ bgp_neighbors }}"
      when: ansible_network_os | regex_search('iosxr')

    # === HUAWEI VRP BGP CONFIGURATION ===
    - name: Configure BGP process on Huawei VRP
      community.network.ce_config:
        lines:
          - bgp {{ bgp_as }}
          - router-id {{ bgp_router_id | default(omit) }}
        provider: "{{ ansible_ssh_pass | default('') }}"
      when: ansible_network_os | regex_search('vrp|ce68')

    - name: Configure BGP neighbor on Huawei VRP
      community.network.ce_config:
        lines:
          - peer {{ item.ip }} as-number {{ item.remote_as }}
          - description {{ item.description }}
        parents:
          - bgp {{ bgp_as }}
        provider: "{{ ansible_ssh_pass | default('') }}"
      loop: "{{ bgp_neighbors }}"
      when: ansible_network_os | regex_search('vrp|ce68')

    # === VERIFICATION ===
    - name: Verify BGP neighbor (Cisco)
      cisco.ios.ios_command:
        commands:
          - show bgp neighbors {{ peer_ip }}
      register: bgp_neighbor_status
      when: ansible_network_os | regex_search('iosxr')
      ignore_errors: yes

    - name: Verify BGP neighbor (Huawei)
      community.network.ce_command:
        commands: display bgp peer {{ peer_ip }}
      register: huawei_bgp_status
      when: ansible_network_os | regex_search('vrp|ce68')
      ignore_errors: yes

    - name: Display BGP configuration result
      ansible.builtin.debug:
        msg: "BGP peer {{ peer_ip }} (AS {{ peer_as }}) configured on {{ inventory_hostname }}"