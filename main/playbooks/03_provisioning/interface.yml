---
# Interface Configuration Playbook
# Phase 4: Config Provisioning
# Usage: ansible-playbook playbooks/03_provisioning/interface.yml -e "interface_name=GigabitEthernet0/0/0/1 description='Uplink to Core' mtu=9000"

- name: Configure Network Interfaces
  hosts: all
  gather_facts: false
  connection: network_cli

  vars:
    interface_name: "{{ interface_name | default(omit) }}"
    interface_description: "{{ interface_description | default('Managed by Ansible') }}"
    interface_mtu: "{{ interface_mtu | default(1500) }}"
    interface_speed: "{{ interface_speed | default('auto') }}"
    interface_duplex: "{{ interface_duplex | default('auto') }}"
    interface_ip: "{{ interface_ip | default(omit) }}"
    interface_mask: "{{ interface_mask | default(omit) }}"
    interface_vrf: "{{ interface_vrf | default(omit) }}"
    interface_enabled: "{{ interface_enabled | default(true) }}"
    interface_switchport: false
    interface_vlan_access: "{{ interface_vlan_access | default(omit) }}"
    interface_trunk_vlans: "{{ interface_trunk_vlans | default(omit) }}"

  tasks:
    - name: Validate interface name
      ansible.builtin.fail:
        msg: "interface_name is required"
      when: interface_name is not defined

    # === CISCO IOS-XR INTERFACE CONFIGURATION ===
    - name: Configure Cisco IOS-XR Interface
      cisco.ios.ios_config:
        lines:
          - description {{ interface_description }}
          - mtu {{ interface_mtu }}
          - {% if interface_enabled %}no shutdown{% else %}shutdown{% endif %}
        parents: "interface {{ interface_name }}"
      when: ansible_network_os | regex_search('iosxr')

    - name: Configure IP address on Cisco interface
      cisco.ios.ios_config:
        lines:
          - ip address {{ interface_ip }} {{ interface_mask }}
        parents: "interface {{ interface_name }}"
      when: >
        interface_ip is defined and interface_mask is defined and
        ansible_network_os | regex_search('iosxr')

    - name: Assign interface to VRF on Cisco
      cisco.ios.ios_config:
        lines:
          - vrf {{ interface_vrf }}
        parents: "interface {{ interface_name }}"
      when: interface_vrf is defined and ansible_network_os | regex_search('iosxr')

    # === HUAWEI VRP INTERFACE CONFIGURATION ===
    - name: Configure Huawei VRP Interface
      community.network.ce_config:
        lines:
          - description {{ interface_description }}
          - mtu {{ interface_mtu }}
        parents: "interface {{ interface_name }}"
        provider: "{{ ansible_ssh_pass | default('') }}"
      when: ansible_network_os | regex_search('vrp|ce68')

    - name: Configure IP address on Huawei interface
      community.network.ce_config:
        lines:
          - ip address {{ interface_ip }} {{ interface_mask }}
        parents: "interface {{ interface_name }}"
        provider: "{{ ansible_ssh_pass | default('') }}"
      when: >
        interface_ip is defined and interface_mask is defined and
        ansible_network_os | regex_search('vrp|ce68')

    - name: Enable Huawei interface
      community.network.ce_config:
        lines:
          - {% if interface_enabled %}undo shutdown{% else %}shutdown{% endif %}
        parents: "interface {{ interface_name }}"
        provider: "{{ ansible_ssh_pass | default('') }}"
      when: ansible_network_os | regex_search('vrp|ce68')

    # === VERIFICATION ===
    - name: Verify interface configuration (Cisco)
      cisco.ios.ios_command:
        commands:
          - show interfaces {{ interface_name }} description
      register: interface_status
      when: ansible_network_os | regex_search('iosxr')
      ignore_errors: yes

    - name: Verify interface configuration (Huawei)
      community.network.ce_command:
        commands: display interface {{ interface_name }} description
      register: huawei_interface_status
      when: ansible_network_os | regex_search('vrp|ce68')
      ignore_errors: yes

    - name: Display interface configuration result
      ansible.builtin.debug:
        msg: "Interface {{ interface_name }} configured on {{ inventory_hostname }}"