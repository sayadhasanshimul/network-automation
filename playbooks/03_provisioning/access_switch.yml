---
# Access Switch Management Playbook
# Manage core switches, distribution switches, and access switches
# Usage: ansible-playbook playbooks/access_switch.yml -e "target_group=core_switches"

- name: Access Switch Management
  hosts: "{{ target_group | default('all') }}"
  gather_facts: true
  connection: network_cli

  vars:
    interface_name: "{{ interface_name | default(omit) }}"
    interface_description: "{{ interface_description | default('Managed by Ansible') }}"
    interface_mtu: "{{ interface_mtu | default(1500) }}"
    interface_vlan: "{{ interface_vlan | default(1) }}"
    interface_speed: "{{ interface_speed | default('auto') }}"
    interface_enabled: "{{ interface_enabled | default(true) }}"
    port_security_max: 3
    stp_portfast: false

  tasks:
    # === GET SWITCH INFO ===
    - name: Get switch version (Cisco)
      cisco.ios.ios_command:
        commands: show version
      register: cisco_version
      when: ansible_network_os | regex_search('ios')
      ignore_errors: yes

    - name: Get switch version (Huawei)
      community.network.ce_command:
        commands: display version
      register: huawei_version
      when: ansible_network_os | regex_search('vrp')
      ignore_errors: yes

    # === INTERFACE CONFIGURATION (CISCO) ===
    - name: Configure interface (Cisco IOS)
      cisco.ios.ios_config:
        lines:
          - description {{ interface_description }}
          - speed {{ interface_speed }}
          - {% if interface_enabled %}no shutdown{% else %}shutdown{% endif %}
        parents: "interface {{ interface_name }}"
      when: >
        interface_name is defined and
        ansible_network_os | regex_search('ios')

    - name: Configure switchport (Cisco)
      cisco.ios.ios_config:
        lines:
          - switchport mode {{ switchport_mode | default('access') }}
          - switchport access vlan {{ interface_vlan }}
          - spanning-tree portfast
        parents: "interface {{ interface_name }}"
      when: >
        interface_name is defined and
        switchport_mode is defined and
        ansible_network_os | regex_search('ios')

    - name: Configure port security (Cisco)
      cisco.ios.ios_config:
        lines:
          - switchport port-security maximum {{ port_security_max }}
          - switchport port-security violation {{ port_security_violation | default('restrict') }}
        parents: "interface {{ interface_name }}"
      when: >
        interface_name is defined and
        port_security_enabled | default(false) and
        ansible_network_os | regex_search('ios')

    # === INTERFACE CONFIGURATION (HUAWEI) ===
    - name: Configure interface (Huawei VRP)
      community.network.ce_config:
        lines:
          - description {{ interface_description }}
          - {% if interface_enabled %}undo shutdown{% else %}shutdown{% endif %}
        parents: "interface {{ interface_name }}"
        provider: "{{ ansible_ssh_pass | default('') }}"
      when: >
        interface_name is defined and
        ansible_network_os | regex_search('vrp')

    - name: Configure switchport (Huawei)
      community.network.ce_config:
        lines:
          - port link-type {{ switchport_mode | default('access') }}
          - port default vlan {{ interface_vlan }}
        parents: "interface {{ interface_name }}"
        provider: "{{ ansible_ssh_pass | default('') }}"
      when: >
        interface_name is defined and
        switchport_mode is defined and
        ansible_network_os | regex_search('vrp')

    # === VERIFY INTERFACE ===
    - name: Verify interface status (Cisco)
      cisco.ios.ios_command:
        commands:
          - show interfaces {{ interface_name }} status
      register: verify_cisco
      when: ansible_network_os | regex_search('ios')
      ignore_errors: yes

    - name: Verify interface status (Huawei)
      community.network.ce_command:
        commands: display interface {{ interface_name }} brief
      register: verify_huawei
      when: ansible_network_os | regex_search('vrp')
      ignore_errors: yes

    - name: Display result
      ansible.builtin.debug:
        msg: "Interface {{ interface_name }} configured on {{ inventory_hostname }}"