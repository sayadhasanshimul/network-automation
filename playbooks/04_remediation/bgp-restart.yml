---
# BGP Session Restart Playbook
# Phase 5: Failover & Remediation
# Usage: ansible-playbook playbooks/04_remediation/bgp-restart.yml -e "bgp_neighbor=192.168.1.100"

- name: BGP Session Restart & Recovery
  hosts: all
  gather_facts: false
  connection: network_cli

  vars:
    bgp_neighbor: "{{ bgp_neighbor | default(omit) }}"
    bgp_as: "{{ bgp_as | default(omit) }}"
    restart_cooldown_minutes: 5
    clear_command: "clear bgp {{ bgp_neighbor }} soft"
    auto_restart: "{{ auto_restart | default(true) }}"

  tasks:
    - name: Validate BGP neighbor
      ansible.builtin.fail:
        msg: "bgp_neighbor is required"
      when: bgp_neighbor is not defined

    # === CHECK BGP SESSION STATUS ===
    - name: Get BGP neighbor status (Cisco)
      cisco.ios.ios_command:
        commands:
          - show bgp neighbors {{ bgp_neighbor }}
      register: cisco_bgp_status
      when: ansible_network_os | regex_search('iosxr|ios')
      ignore_errors: yes

    - name: Get BGP peer status (Huawei)
      community.network.ce_command:
        commands: display bgp peer {{ bgp_neighbor }}
      register: huawei_bgp_status
      when: ansible_network_os | regex_search('vrp|ce68')
      ignore_errors: yes

    # === PARSE BGP SESSION STATE ===
    - name: Determine BGP session state (Cisco)
      ansible.builtin.set_fact:
        bgp_session_up: "{{ cisco_bgp_status.stdout_lines[0] is search('Established') if cisco_bgp_status.stdout_lines is defined else false }}"
        bgp_session_down: true
      when: cisco_bgp_status.stdout_lines is defined

    - name: Set BGP session state (Huawei)
      ansible.builtin.set_fact:
        bgp_session_up: "{{ huawei_bgp_status.stdout_lines[0] is search('Established') if huawei_bgp_status.stdout_lines is defined else false }}"
        bgp_session_down: true
      when: huawei_bgp_status.stdout_lines is defined

    - name: Default BGP session state
      ansible.builtin.set_fact:
        bgp_session_up: false
        bgp_session_down: true
      when: >
        cisco_bgp_status.stdout_lines is not defined and
        huawei_bgp_status.stdout_lines is not defined

    # === RESTART BGP SESSION (CISCO) ===
    - name: Clear BGP session with soft reset (Cisco)
      cisco.ios.ios_command:
        commands: "clear bgp {{ bgp_neighbor }} soft"
      when: >
        bgp_session_down | default(true) and
        auto_restart | default(true) and
        ansible_network_os | regex_search('iosxr')
      ignore_errors: yes

    - name: Reset BGP TCP session (Cisco)
      cisco.ios.ios_command:
        commands: "clear bgp {{ bgp_neighbor }} tcp"
      when: >
        bgp_session_down | default(true) and
        auto_restart | default(true) and
        ansible_network_os | regex_search('iosxr')
      ignore_errors: yes

    # === RESTART BGP SESSION (HUAWEI) ===
    - name: Reset BGP peer (Huawei)
      community.network.ce_command:
        commands: "reset bgp {{ bgp_neighbor }}"
      register: huawei_reset
      when: >
        bgp_session_down | default(true) and
        auto_restart | default(true) and
        ansible_network_os | regex_search('vrp|ce68')
      ignore_errors: yes

    # === VERIFY BGP SESSION RECOVERY ===
    - name: Verify BGP session after restart (Cisco)
      cisco.ios.ios_command:
        commands: show bgp neighbors {{ bgp_neighbor }} | include BGP state
      register: bgp_verification
      retries: 5
      delay: 10
      until: >
        bgp_verification.stdout_lines[0] is search('Established') if bgp_verification.stdout_lines is defined else false
      when: auto_restart | default(true)
      ignore_errors: yes

    - name: Verify BGP session after restart (Huawei)
      community.network.ce_command:
        commands: display bgp peer {{ bgp_neighbor }} | include State
      register: huawei_verification
      retries: 5
      delay: 10
      until: >
        huawei_verification.stdout_lines[0] is search('Established') if huawei_verification.stdout_lines is defined else false
      when: auto_restart | default(true) and ansible_network_os | regex_search('vrp|ce68')
      ignore_errors: yes

    # === REPORTING ===
    - name: Report BGP restart result
      ansible.builtin.debug:
        msg: "BGP session {{ bgp_neighbor }} on {{ inventory_hostname }} - {{ 'RECOVERED' if bgp_session_up else 'STILL DOWN' }}"

    - name: Alert - BGP session down
      ansible.builtin.debug:
        msg: "CRITICAL: BGP session to {{ bgp_neighbor }} on {{ inventory_hostname }} is DOWN"
      when: bgp_session_down | default(true)

    - name: Alert - BGP restart failed
      ansible.builtin.debug:
        msg: "ALERT: BGP restart FAILED for {{ bgp_neighbor }} on {{ inventory_hostname }} - Manual intervention required"
      when: >
        bgp_session_down | default(true) and
        (bgp_verification.stdout_lines[0] is not search('Established') if bgp_verification.stdout_lines is defined else true)