---
# Network Automation Inventory
# Add your devices below

all:
  children:
    # Cisco IOS-XR devices (NCS540 series)
    cisco_iosxr:
      vars:
        ansible_network_os: iosxr
        ansible_user: automation
        authorize: yes
        ansible_become: yes
        ansible_become_method: sudo
        ansible_become_user: root
      hosts:
        # NCS540 Core Router - UPDATE THESE VALUES
        ncs540-core-01:
          ansible_host: 192.168.1.1
          device_type: cisco_ncs540
          site: core
          role: core_router
        ncs540-core-02:
          ansible_host: 192.168.1.2
          device_type: cisco_ncs540
          site: core
          role: core_router

    # Huawei VRP devices (CE6855 series)
    huawei_vrp:
      vars:
        ansible_network_os: vrp
        ansible_user: automation
        ansible_ssh_pass: "{{ lookup('env', 'HUAWEI_SSH_PASS') }}"
        ansible_become: yes
        ansible_become_method: sudo
        ansible_become_user: root
      hosts:
        # CE6855 CDN Core Router - UPDATE THESE VALUES
        ce6855-cdn-01:
          ansible_host: 192.168.1.3
          device_type: huawei_ce6855
          site: cdn
          role: cdn_router
        ce6855-cdn-02:
          ansible_host: 192.168.1.4
          device_type: huawei_ce6855
          site: cdn
          role: cdn_router

    # ============================================
    # CORE SWITCHES (4x Huawei CE6855)
    # ============================================
    core_switches:
      vars:
        ansible_network_os: vrp
        ansible_user: automation
        ansible_ssh_pass: "{{ lookup('env', 'HUAWEI_SSH_PASS') }}"
        ansible_become: yes
        ansible_become_method: sudo
        ansible_become_user: root
      hosts:
        # Huawei CE6855 Core Switch 01 - UPDATE IP
        core-sw-huawei-01:
          ansible_host: 10.1.1.1
          device_type: huawei_ce6855
          site: core
          role: core_switch
          model: Huawei CE6855
          ports: 32
        # Huawei CE6855 Core Switch 02 - UPDATE IP
        core-sw-huawei-02:
          ansible_host: 10.1.1.2
          device_type: huawei_ce6855
          site: core
          role: core_switch
          model: Huawei CE6855
          ports: 32
        # Huawei CE6855 Core Switch 03 - UPDATE IP
        core-sw-huawei-03:
          ansible_host: 10.1.1.3
          device_type: huawei_ce6855
          site: core
          role: core_switch
          model: Huawei CE6855
          ports: 32
        # Huawei CE6855 Core Switch 04 - UPDATE IP
        core-sw-huawei-04:
          ansible_host: 10.1.1.4
          device_type: huawei_ce6855
          site: core
          role: core_switch
          model: Huawei CE6855
          ports: 32

    # ============================================
    # DISTRIBUTION ROUTERS (4x Huawei CE6855)
    # VRP 8.191
    # ============================================
    dist_routers:
      vars:
        ansible_network_os: vrp
        ansible_user: automation
        ansible_ssh_pass: "{{ lookup('env', 'HUAWEI_SSH_PASS') }}"
        ansible_become: yes
        ansible_become_method: sudo
        ansible_become_user: root
        os_version: "VRP 8.191"
      hosts:
        # Huawei CE6855 Distribution Router 01 - UPDATE IP
        dist-rtr-huawei-01:
          ansible_host: 10.1.2.1
          device_type: huawei_ce6855
          site: distribution
          role: dist_router
          model: Huawei CE6855
          os_version: VRP 8.191
        # Huawei CE6855 Distribution Router 02 - UPDATE IP
        dist-rtr-huawei-02:
          ansible_host: 10.1.2.2
          device_type: huawei_ce6855
          site: distribution
          role: dist_router
          model: Huawei CE6855
          os_version: VRP 8.191
        # Huawei CE6855 Distribution Router 03 - UPDATE IP
        dist-rtr-huawei-03:
          ansible_host: 10.1.2.3
          device_type: huawei_ce6855
          site: distribution
          role: dist_router
          model: Huawei CE6855
          os_version: VRP 8.191
        # Huawei CE6855 Distribution Router 04 - UPDATE IP
        dist-rtr-huawei-04:
          ansible_host: 10.1.2.4
          device_type: huawei_ce6855
          site: distribution
          role: dist_router
          model: Huawei CE6855
          os_version: VRP 8.191

    # ============================================
    # DISTRIBUTION SWITCHES (4)
    # 1x Huawei CE6851 + 3x Cisco N9K
    # ============================================
    dist_switches:
      children:
        cisco_dist_sw:
          vars:
            ansible_network_os: nxos
            ansible_user: automation
            authorize: yes
            ansible_become: yes
            ansible_become_method: sudo
            ansible_become_user: root
          hosts:
            # Cisco N9K Distribution Switch 01 - UPDATE IP
            dist-sw-n9k-01:
              ansible_host: 10.1.3.1
              device_type: cisco_nxos
              site: distribution
              role: dist_switch
              model: Cisco Nexus N9K
            # Cisco N9K Distribution Switch 02 - UPDATE IP
            dist-sw-n9k-02:
              ansible_host: 10.1.3.2
              device_type: cisco_nxos
              site: distribution
              role: dist_switch
              model: Cisco Nexus N9K
            # Cisco N9K Distribution Switch 03 - UPDATE IP
            dist-sw-n9k-03:
              ansible_host: 10.1.3.3
              device_type: cisco_nxos
              site: distribution
              role: dist_switch
              model: Cisco Nexus N9K

        huawei_dist_sw:
          vars:
            ansible_network_os: vrp
            ansible_user: automation
            ansible_ssh_pass: "{{ lookup('env', 'HUAWEI_SSH_PASS') }}"
            ansible_become: yes
            ansible_become_method: sudo
            ansible_become_user: root
          hosts:
            # Huawei CE6851 Distribution Switch 01 - UPDATE IP
            dist-sw-huawei-01:
              ansible_host: 10.1.3.11
              device_type: huawei_ce6851
              site: distribution
              role: dist_switch
              model: Huawei CE6851

# Global variables for all devices
  vars:
    # Thresholds
    ping_threshold_ms: 100
    packet_loss_threshold_percent: 1
    interface_flap_threshold: 3
    interface_flap_window_minutes: 5
    bgp_session_drop_seconds: 60
    bgp_restart_cooldown_minutes: 5

    # Backup settings
    backup_retention_days: 90
    config_backup_path: /opt/network-automation/backups
    git_repo: git@github.com:your-org/network-configs.git

    # Monitoring
    monitoring_enabled: true
    snmp_community: public
    syslog_server: 192.168.1.100

    # Alert settings
    alert_email: netfury@yourcompany.com
    critical_alert_recipients:
      - netfury@yourcompany.com
      - noc@yourcompany.com
    warning_alert_recipients:
      - netfury@yourcompany.com